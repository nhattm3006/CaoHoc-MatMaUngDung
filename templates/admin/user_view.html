{% extends "base.html" %}
{% set is_admin_context = True %}

{% block content %}
<div class="mt-4 row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-info text-white">
                <h3 class="card-title mb-0">User Info</h3>
            </div>
            <div class="card-body">
                <table class="table">
                    <tr>
                        <th>Username</th>
                        <td>{{user.username}}</td>
                    </tr>
                    <tr>
                        <th>Name</th>
                        <td>{{user.name or 'N/A'}}</td>
                    </tr>
                    <tr>
                        <th>Email</th>
                        <td>{{user.email or 'N/A'}}</td>
                    </tr>
                    <tr>
                        <th>Role</th>
                        <td>{{user.role}}</td>
                    </tr>
                </table>
                <div class="d-grid mt-3">
                    <a href="/admin/user/list" class="btn btn-secondary">Back to List</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
