{% extends "base.html" %}
{% set is_admin_context = True %}

{% block content %}
<div class="mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>User List</h2>
        <a href="/admin/user/add" class="btn btn-primary">Add user</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover border">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{user.id}}</td>
                    <td>
                        <a href="/admin/user/{{user.id}}" class="text-decoration-none fw-bold">
                            {{user.username}}
                        </a>
                    </td>
                    <td><span
                            class="badge {% if user.role == 'admin' %}bg-danger{% else %}bg-secondary{% endif %}">{{user.role}}</span>
                    </td>
                    <td>
                        <a href="/admin/user/edit/{{user.id}}" class="btn btn-sm btn-outline-primary">Edit</a>
                        <form action="/admin/user/reset_password/{{user.id}}" method="POST" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-warning"
                                onclick="return confirm('Reset mật khẩu của người dùng này về 123?')">Reset PW</button>
                        </form>
                        <a href="/admin/user/delete/{{user.id}}" class="btn btn-sm btn-outline-danger"
                            onclick="return confirm('Xóa người dùng này?')">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
